<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多媒體系統設計．個人網站</title>
  <style>
    /* ✅ 1. 統一引入字體 */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Pacifico&family=Poppins:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* --- 顏色變數 --- */
      --golden-yellow: #F5C45A;
      --caramel-brown: #C67B36;
      --cream-white: #FFF8E7; 
      --soft-peach: #F2BFA3;
      --text-dark: #5C4033;
      --text-light: #8B6F47;

      /* --- 字體變數 --- */
      --font-main: 'Poppins', 'Noto Sans TC', sans-serif;
      --font-display: 'Pacifico', cursive;
    }

    body {
      font-family: var(--font-main);
      background: linear-gradient(135deg, var(--cream-white) 0%, #FFF5DC 100%);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 1.5rem 0;
      box-shadow: 0 2px 20px rgba(198, 123, 54, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-dark);
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--golden-yellow), var(--caramel-brown));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-text {
      font-family: var(--font-display);
      color: var(--caramel-brown);
      font-size: 1.5rem;
      font-weight: 400;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .nav-btn {
      padding: 0.75rem 1.75rem;
      background: linear-gradient(135deg, var(--golden-yellow), var(--caramel-brown));
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(198, 123, 54, 0.25);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-block;
      text-decoration: none;
      font-family: var(--font-display); 
      color: white;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(198, 123, 54, 0.35);
    }

    .nav-btn:active {
      transform: translateY(-1px);
    }

    /* Main Section */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    .main-container {
      max-width: 900px;
      width: 100%;
      text-align: center;
    }

    /* ✅ 主標題：設定為黑體、3.5rem，與企劃頁一致 */
    .headline {
      font-family: var(--font-main);
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--caramel-brown);
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

    /* ✅ 強調文字（地瓜球）：保留漸層色，但統一字體與大小 */
    .headline-accent {
      font-family: inherit; /* 改為繼承主標題字體 (黑體) */
      font-size: inherit;   /* 改為繼承主標題大小 (3.5rem) */
      background: linear-gradient(135deg, var(--golden-yellow), var(--caramel-brown));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description-box {
      background: var(--cream-white);
      border: 2px solid rgba(245, 196, 90, 0.3);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      margin-top: 5rem; /* 維持調整後的寬間距 */
      box-shadow: 0 8px 30px rgba(198, 123, 54, 0.12);
      position: relative;
    }

    .description-box::before {
      content: ''; 
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 70px;
      background: url('IMG/p.gif') center/cover no-repeat;
      background-color: white; 
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(198, 123, 54, 0.2);
      border: 2px solid var(--golden-yellow);
    }

    .description-text {
      font-size: 1.15rem;
      line-height: 1.8;
      color: var(--text-light);
      margin-bottom: 1.5rem;
      font-family: var(--font-main);
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      margin-top: 2.5rem;
    }

    .feature-item {
      text-align: center;
      transition: transform 0.3s ease;
      padding: 1rem;
      border-radius: 16px;
    }

    .feature-item:hover {
        background: rgba(255, 255, 255, 0.5);
        transform: translateY(-5px);
    }

    .feature-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--soft-peach), var(--golden-yellow));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin: 0 auto 1rem;
      box-shadow: 0 4px 15px rgba(242, 191, 163, 0.3);
    }

    .feature-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      font-family: var(--font-main);
    }

    .feature-desc {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.6;
      font-family: var(--font-main);
    }

    /* Footer */
    footer {
      background: rgba(92, 64, 51, 0.05);
      padding: 2rem;
      text-align: center;
      border-top: 1px solid rgba(198, 123, 54, 0.1);
      margin-top: auto;
    }

    .footer-content {
      max-width: 1400px;
      margin: 0 auto;
    }

    .footer-text {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      font-family: var(--font-main);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .footer-link {
      color: var(--caramel-brown);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.3s ease;
      font-family: var(--font-main);
    }

    .footer-link:hover {
      color: var(--golden-yellow);
    }

    /* Decorative Elements */
    .decoration {
      position: fixed;
      pointer-events: none;
      opacity: 0.1;
      font-size: 100px;
      z-index: 0;
    }

    .decoration:nth-child(1) {
      top: 10%;
      left: 5%;
      color: var(--golden-yellow);
      animation: float 8s ease-in-out infinite;
    }

    .decoration:nth-child(2) {
      bottom: 15%;
      right: 8%;
      color: var(--soft-peach);
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    /* Responsive Design */
    @media (max-width: 1024px) {
      .headline {
        font-size: 3rem;
      }
      .description-box {
        padding: 2.5rem 2rem;
      }
    }

    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        gap: 1.5rem;
        text-align: center;
      }
      .nav-links {
        flex-direction: column;
        width: 100%;
      }
      .nav-btn {
        width: 100%;
        text-align: center;
      }
      .headline { font-size: 2.2rem; }
      .description-box { padding: 2rem 1.5rem; }
      .features { grid-template-columns: 1fr; gap: 1.5rem; }
      .footer-links { flex-direction: column; gap: 0.75rem; }
    }

    @media (max-width: 480px) {
      .headline { font-size: 1.8rem; }
      .description-text { font-size: 1rem; }
      .logo-text { font-size: 1.25rem; }
      .logo-icon { width: 50px; height: 50px; }
    }
  </style>
</head>

<body>
